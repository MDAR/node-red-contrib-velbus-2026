<script type="text/javascript">
(function() {

  const BUTTON_TYPES = {
    0x01: { name: 'VMB8PB',    channels: 8, series: 'original', hasLock: false },
    0x16: { name: 'VMB8PBU',   channels: 8, series: 'original', hasLock: true  },
    0x17: { name: 'VMB6PBN',   channels: 6, series: 'original', hasLock: true  },
    0x44: { name: 'VMB4PB',    channels: 4, series: 'original', hasLock: true  },
    0x4C: { name: 'VMB6PB-20', channels: 6, series: 'v2',       hasLock: true  },
    0x0A: { name: 'VMB8IR',    channels: 8, series: 'original', hasLock: false },
    0x0B: { name: 'VMB4PD',    channels: 4, series: 'original', hasLock: false },
    0x1A: { name: 'VMB4RF',    channels: 4, series: 'original', hasLock: true  },
    0x30: { name: 'VMBRFR8S',  channels: 8, series: 'original', hasLock: true  },
    0x33: { name: 'VMBVP01',   channels: 8, series: 'original', hasLock: false },
    0x42: { name: 'VMBKP',     channels: 8, series: 'v2',       hasLock: true  },
    0x43: { name: 'VMBIN',     channels: 1, series: 'original', hasLock: true  },
  };

  RED.nodes.registerType('velbus-button', {
    category:  'Velbus (inputs)',
    color:     '#3A8C8C',
    defaults: {
      name:         { value: '' },
      bridge:       { value: '', type: 'velbus-bridge', required: true },
      address:      { value: '', required: true, validate: function(v) { const n = parseInt(v); return !isNaN(n) && n >= 1 && n <= 254; } },
      channelCount: { value: 8 },
      moduleName:   { value: '' },
      typeId:       { value: '' },
    },
    inputs:  1,
    outputs: 2,
    outputLabels: ['button events / status', 'warnings'],
    icon:    'font-awesome/fa-hand-pointer-o',
    paletteLabel: 'button',

    label: function() {
      return this.name || this.moduleName ||
        ('BTN 0x' + (parseInt(this.address) || 0).toString(16).padStart(2, '0').toUpperCase());
    },

    oneditprepare: function() {
      const savedAddr   = this.address;
      const savedTypeId = this.typeId ? parseInt(this.typeId, 16) : null;

      $('#node-input-typeId').prop('readonly', true).css('background', '#f0f0f0');

      function populateDropdown(bridgeId) {
        const $addr = $('#node-input-address');
        if (!bridgeId) return;

        $.getJSON('velbus/scan-results?bridge=' + bridgeId, function(results) {
          const modules = (results && results.modules) ? results.modules : [];
          if (!modules.length) return;

          $addr.empty().append($('<option>').val('').text('— select address —'));

          const btnTypeIds = Object.keys(BUTTON_TYPES).map(k => parseInt(k));
          const btnModules = modules.filter(m => btnTypeIds.includes(parseInt(m.typeId, 16)));

          if (!btnModules.length) {
            $addr.append($('<option>').val('').text('No button modules found on bus'));
            return;
          }

          btnModules.forEach(function(m) {
            const tid   = parseInt(m.typeId, 16);
            const label = m.address + ' — ' + m.module;
            const $opt  = $('<option>').val(m.addressDec).text(label).data('typeid', tid);
            if (m.addressDec === parseInt(savedAddr)) $opt.attr('selected', true);
            $addr.append($opt);
          });

          if (savedAddr) updateHint(parseInt(savedAddr));
        });
      }

      function updateHint(addrDec) {
        const $opt = $('#node-input-address option[value="' + addrDec + '"]');
        const tid  = $opt.data('typeid');
        if (tid && BUTTON_TYPES[tid]) {
          const t = BUTTON_TYPES[tid];
          $('#btn-type-hint').text(t.name + ' — ' + t.channels + ' ch · ' + t.series +
            (t.hasLock ? ' · lock/unlock supported' : ' · no lock/unlock')).show();
          $('#node-input-typeId').val('0x' + tid.toString(16).padStart(2,'0').toUpperCase());
          const $ch = $('#node-input-channelCount');
          if (!$ch.val() || $ch.data('auto')) $ch.val(t.channels).data('auto', true);
        } else {
          $('#btn-type-hint').hide();
        }
      }

      $('#node-input-bridge').on('change', function() { populateDropdown($(this).val()); });
      $('#node-input-address').on('change', function() { updateHint(parseInt($(this).val())); });
      $('#node-input-channelCount').on('input', function() { $(this).data('auto', false); });

      // Deferred load — TypedInput sets value async after oneditprepare


      $('#node-input-bridge').trigger('change');


      setTimeout(function() { $('#node-input-bridge').trigger('change'); }, 150);
    },

    oneditsave: function() {
      this.address = parseInt($('#node-input-address').val()) || 0;
      const tid = $('#node-input-typeId').val();
      this.typeId = tid || '';
      if (tid) {
        const t = BUTTON_TYPES[parseInt(tid, 16)];
        if (t) this.moduleName = t.name;
      }
    },
  });

})();
</script>

<script type="text/html" data-template-name="velbus-button">
  <div class="form-row">
    <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
    <input type="text" id="node-input-name" placeholder="Optional label">
  </div>
  <div class="form-row">
    <label for="node-input-bridge"><i class="fa fa-plug"></i> Bridge</label>
    <input type="text" id="node-input-bridge">
  </div>
  <div class="form-row">
    <label for="node-input-address"><i class="fa fa-map-marker"></i> Address</label>
    <select id="node-input-address" style="width:70%">
      <option value="">— select bridge first —</option>
    </select>
  </div>
  <div class="form-row">
    <label></label>
    <span id="btn-type-hint" style="color:#888; font-size:0.9em; display:none;"></span>
  </div>
  <div class="form-row" style="display:none">
    <input type="text" id="node-input-typeId">
    <input type="text" id="node-input-moduleName">
  </div>
  <div class="form-row">
    <label for="node-input-channelCount"><i class="fa fa-list-ol"></i> Channels</label>
    <input type="number" id="node-input-channelCount" min="1" max="32" style="width:80px">
    <span style="margin-left:8px; color:#888; font-size:0.9em;">auto-filled from scan</span>
  </div>
</script>

<script type="text/html" data-help-name="velbus-button">
  <p style="background:#fff3cd; border-left:4px solid #ffc107; padding:8px 12px; margin-bottom:12px; font-size:0.85em;">
  <strong>&#9888; Testing status:</strong> This node was generated with Claude.ai and is in
  need of extensive field testing before being deployed into a commercial project.
  It is presented "as is" &mdash; any use beyond testing is entirely at your own risk and liability.
  Constructive feedback is welcomed, accompanied by as many examples and debug captures as possible.
  <a href="https://github.com/MDAR/node-red-contrib-velbus-2026/issues" target="_blank">File an issue on GitHub</a>.
  </p>
  <p>
    Button and input module node for Velbus push-button panels — original and V2 series.
    For glass panel modules (VMBEL, VMBGP) with thermostat use <strong>velbus-glass-panel</strong> instead.
  </p>

  <h3>Supported modules</h3>
  <table style="width:100%; font-size:0.85em; border-collapse:collapse;">
    <tr style="text-align:left; border-bottom:1px solid #ccc;"><th>Module</th><th>Channels</th><th>Lock/unlock</th><th>Notes</th></tr>
    <tr><td>VMB8PB</td><td>8</td><td>No</td><td>Original series</td></tr>
    <tr><td>VMB8PBU</td><td>8</td><td>Yes</td><td>Original series</td></tr>
    <tr><td>VMB6PBN</td><td>6</td><td>Yes</td><td>Original series</td></tr>
    <tr><td>VMB4PB</td><td>4</td><td>Yes</td><td>Original series</td></tr>
    <tr><td>VMB6PB-20</td><td>6</td><td>Yes</td><td>V2 series</td></tr>
    <tr><td>VMB8IR</td><td>8</td><td>No</td><td>IR remote receiver — presents fixed Velbus IR codes as button events</td></tr>
    <tr><td>VMB4PD</td><td>4</td><td>No</td><td>LCD module — only the 4 button channels are covered, not the LCD display</td></tr>
    <tr><td>VMB4RF</td><td>4</td><td>Yes</td><td>433MHz RF receiver</td></tr>
    <tr><td>VMBRFR8S</td><td>8</td><td>Yes</td><td>433MHz RF receiver, 8 channel</td></tr>
    <tr><td>VMBVP01</td><td>8</td><td>No</td><td>DoorBird intercom — fixed channel labels: Motion 1/2, Bell 1/2, Door 1/2, Virtual button 1/2</td></tr>
    <tr><td>VMBKP</td><td>8</td><td>Yes</td><td>Simple OEM keypad module</td></tr>
    <tr><td>VMBIN</td><td>1</td><td>Yes</td><td>Single-channel input</td></tr>
  </table>
  <p style="font-size:0.85em; color:#888;">
    Also suitable for glass panel sub-addresses when button events need separate wiring.
  </p>

  <h3>Output 1 — button events / status</h3>
  <pre>{
  "type":        "button",
  "on":          true,
  "pressed":     [1, 3],
  "released":    [],
  "longPressed": []
}</pre>
  <p>
    <code>on</code> is <code>true</code> when any channel is pressed or long-pressed.
    Channel numbers are 1-indexed. All three arrays are always present — empty when no
    channels are in that state. For modules with configured or fixed channel names,
    array entries become <code>{ "channel": 3, "label": "Landing" }</code> objects
    instead of plain numbers — check for a <code>.label</code> property if you need to
    handle both cases generically.
  </p>

  <p>For modules with lock/unlock support, a richer status is also emitted whenever the
  module sends one (not requestable on demand except via <code>get_status</code> below):</p>
  <pre>{
  "type": "status",
  "program": "group1",
  "channels": [
    { "channel": 1, "pressed": false, "enabled": true, "inverted": false,
      "locked": false, "programDisabled": false },
    ...
  ]
}</pre>

  <h3>Output 2 — warnings</h3>
  <p>Fires when a command isn't supported by the configured module type (e.g. sending
  <code>lock</code> to a VMB8PB) — nothing is sent to the bus in that case.</p>

  <h3>Input — Commands</h3>
  <pre>
{ "cmd": "get_status" }
{ "cmd": "get_name", "channel": 3 }
{ "cmd": "lock",   "channel": 3, "duration": 60 }
{ "cmd": "lock",   "channel": 3 }                 // omit duration = permanent
{ "cmd": "unlock", "channel": 3 }
{ "cmd": "lock",   "channel": "all" }              // or omit channel entirely
  </pre>
  <p><code>lock</code>/<code>unlock</code> only take effect on modules that support them
  (see the table above) — sent to any other type, output 2 explains why nothing happened
  rather than silently doing nothing.</p>
</script>
